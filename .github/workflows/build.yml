name: Build Cyrus

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  build-linux-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y software-properties-common llvm-18 llvm-18-dev clang zlib1g zlib1g-dev libpolly-18-dev

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        run: cargo build --verbose --release

      - name: Run tests
        run: cargo test --all --verbose

      - name: Collect files in single directory
        run: |
          mkdir cyrus
          cp ./target/release/cyrus ./cyrus
          cp ./scripts/install.sh ./cyrus
          cp -r ./stdlib ./cyrus

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-linux
          path: ./cyrus

  build-linux-rpm:
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
      - name: Install build tools
        run: |
          dnf install -y rpm-build rpmdevtools dnf-plugins-core make gcc rust cargo llvm clang

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up RPM build environment
        run: |
          rpmdev-setuptree
          mkdir -p ~/rpmbuild/SOURCES
          tar --warning=no-file-changed --ignore-failed-read -czf cyrus-0.0.1.tar.gz .
          cp .github/workflows/cyrus.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          cd ~/rpmbuild/SPECS
          rpmbuild -ba cyrus.spec

      - name: Upload RPM and spec
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-fedora-rpm
          path: |
            ~/rpmbuild/RPMS/**/*.rpm
            ~/rpmbuild/SPECS/cyrus.spec
  build-linux-arch:
        runs-on: ubuntu-latest
        container: archlinux:rolling
        steps:
          - uses: actions/checkout@v4
    
          - name: Install dependencies
            run: |
              pacman -Sy --noconfirm --needed base-devel rust llvm clang libffi libxml2 isl
    
          - name: Build PKGBUILD
            run: |
              cd .github/workflows
              makepkg -sri --noconfirm
    
          - name: Upload Arch package
            uses: actions/upload-artifact@v4
            with:
              name: cyrus-arch
              path: |
                .github/workflows/*.pkg.tar.zst
  
