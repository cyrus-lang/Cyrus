name: Cyrus Linux - Daily Build

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux-ubuntu:
    runs-on: ubuntu-24.04

    outputs:
      datetime: ${{ steps.date.outputs.datetime }}
      artifact_name: ${{ steps.date.outputs.artifact_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y software-properties-common llvm-18 llvm-18-dev clang-18 zlib1g zlib1g-dev libpolly-18-dev upx libasan8

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        env:
          LLVM_CONFIG: /usr/bin/llvm-config-18
          CC: clang
          CXX: clang++
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh

      - name: Collect files
        run: |
          mkdir -p cyrus
          cp ./target/release/cyrus ./cyrus
          cp ./scripts/install.sh ./cyrus
          cp -r ./stdlib ./cyrus/

      - name: Generate build metadata (SINGLE SOURCE OF TRUTH)
        id: date
        run: |
          DATETIME=$(date +'%Y%m%d-%H%M%S')
          echo "datetime=$DATETIME" >> $GITHUB_OUTPUT
          echo "artifact_name=cyrus-linux-$DATETIME" >> $GITHUB_OUTPUT

      - name: Zip release
        run: |
          zip -r -9 "${{ steps.date.outputs.artifact_name }}.zip" ./cyrus

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.date.outputs.artifact_name }}
          path: ${{ steps.date.outputs.artifact_name }}.zip


  create-daily-release:
    needs: build-linux-ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact (correct name)
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-linux-ubuntu.outputs.artifact_name }}
          path: ./release-files

      - name: Create Git tag
        run: |
          TAG="daily-${{ needs.build-linux-ubuntu.outputs.datetime }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $TAG
          git push origin $TAG

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: daily-${{ needs.build-linux-ubuntu.outputs.datetime }}
          name: "Daily Build - ${{ needs.build-linux-ubuntu.outputs.datetime }}"
          files: ./release-files/*.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}