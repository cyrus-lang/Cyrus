name: Cyrus Linux - Daily Build

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: "0 0 * * *"
  workflow_dispatch: {} # Allow manual trigger

permissions:
  contents: write

jobs:
  build-linux-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y software-properties-common llvm-18 llvm-18-dev clang-18 zlib1g zlib1g-dev libpolly-18-dev upx libasan8

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        env:
          LLVM_CONFIG: /usr/bin/llvm-config-18
          CC: clang
          CXX: clang++
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh

      - name: Collect files in single directory
        run: |
          mkdir cyrus
          cp ./target/release/cyrus ./cyrus
          cp ./scripts/install.sh ./cyrus
          cp -r ./stdlib ./cyrus/

      - name: Create dated zip filename
        id: date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "DATETIME=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Zip release files with date
        run: |
          zip -r -9 "cyrus-linux-${{ env.DATETIME }}.zip" ./cyrus

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-linux-${{ env.DATETIME }}
          path: ./cyrus-linux-${{ env.DATETIME }}.zip

  create-daily-release:
    needs: build-linux-ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Get date for tag
        id: date
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "DATETIME=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV
          echo "TAG_NAME=daily-$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_ENV

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cyrus-linux-${{ env.DATETIME }}
          path: ./release-files

      - name: Create Git Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ env.TAG_NAME }}
          git push origin ${{ env.TAG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release with Date Title
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Daily Build - ${{ env.DATE }}"
          body: |
            ## Daily Automated Build

            **Build Date:** ${{ env.DATE }}
            **Build Time:** ${{ env.DATETIME }}
            
          files: ./release-files/cyrus-linux-${{ env.DATETIME }}.zip
          draft: false
          prerelease: true # Set to false if you want it as full release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
