name: Cyrus Linux

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build-linux-ubuntu:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt install -y software-properties-common llvm-18 llvm-18-dev clang-18 zlib1g zlib1g-dev libpolly-18-dev upx libasan8

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Build
        env:
          LLVM_CONFIG: /usr/bin/llvm-config-18
          CC: clang
          CXX: clang++
        run: |
          chmod +x ./scripts/release.sh
          ./scripts/release.sh

      - name: Run tests
        env:
          LLVM_CONFIG: /usr/bin/llvm-config-18
          CC: clang
          CXX: clang++
        run: make testsuite PROFILE=release

      - name: Collect files in single directory
        run: |
          mkdir cyrus
          cp ./target/release/cyrus ./cyrus
          cp ./scripts/install.sh ./cyrus
          cp -r ./stdlib ./cyrus/

      - name: Zip release files
        run: |
          zip -r -9 cyrus-linux.zip ./cyrus

      - name: Upload as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-linux
          path: ./cyrus-linux.zip

  release:
    needs: build-linux-ubuntu
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: cyrus-linux
          path: ./release-files

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./release-files/cyrus-linux.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
