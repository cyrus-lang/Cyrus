name: Build Cyrus

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest
    container: fedora:42
    steps:
      - name: Install build tools
        run: |
          dnf install -y rpm-build rpmdevtools dnf-plugins-core make gcc rust cargo llvm clang rsync

      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up RPM build environment
        run: |
          rpmdev-setuptree
          mkdir -p ~/rpmbuild/SOURCES

          mkdir cyrus-$CYRUS_VERSION
          rsync -a --exclude '.git' ./ cyrus-$CYRUS_VERSION/
          tar czf ~/rpmbuild/SOURCES/cyrus-$CYRUS_VERSION.tar.gz cyrus-$CYRUS_VERSION

          # Prepend evaluated version as a spec macro
          sed -i "1i %global rust_version $CYRUS_VERSION" .github/workflows/cyrus.spec

          cp .github/workflows/cyrus.spec ~/rpmbuild/SPECS/

      - name: Build RPM
        run: |
          cd ~/rpmbuild/SPECS
          rpmbuild -ba cyrus.spec

      - name: Upload RPM and spec
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-fedora-rpm
          path: |
            ~/rpmbuild/RPMS/**/*.rpm
            ~/rpmbuild/SPECS/cyrus.spec
