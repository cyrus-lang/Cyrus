[package]
name = "codegen_llvm"
version = "0.1.0"
edition = "2024"

[dependencies]
sema = { path = "../cyrusc_sema", version = "*" }
utils = { path = "../cyrusc_utils", version = "*" }
resolver = { path = "../cyrusc_resolver", version = "*" }
diagcentral = { path = "../cyrusc_diagcentral", version = "*" }
inkwell = { version = "0.6.0", features = ["llvm18-1"] }
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
toml = "0.8.20"
blake3 = "1.8.2"